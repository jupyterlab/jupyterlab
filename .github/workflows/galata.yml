name: UI Tests

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Run every 6 hours to establish a baseline for flaky tests
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers

jobs:
  test:
    name: Integration Tests (${{ matrix.browser }} - ${{ matrix.suite }} ${{ matrix.shard }}/${{ matrix.shards }})
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
        shard: [1, 2, 3, 4, 5, 6]
        shards: [6]
        include:
          - browser: chromium
            project: jupyterlab
            suite: jupyterlab
          - browser: firefox
            project: jupyterlab-firefox
            suite: jupyterlab
          - browser: chromium
            project: galata
            suite: galata
            shard: 1
            shards: 2
          - browser: chromium
            project: galata
            suite: galata
            shard: 2
            shards: 2
          - browser: chromium
            project: documentation
            suite: documentation
            shard: 1
            shards: 2
            optional_dependencies: "docs-screenshots"
          - browser: chromium
            project: documentation
            suite: documentation
            shard: 2
            shards: 2
            optional_dependencies: "docs-screenshots"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: core

      - name: Checkout demo project
        if: ${{ matrix.project == 'documentation' }}
        uses: actions/checkout@v6
        with:
          repository: jupyterlab/jupyterlab-demo
          ref: master
          path: demo

      - name: Get demo folder
        if: ${{ matrix.project == 'documentation' }}
        run: |
          echo "DEMO_DIR=$PWD" >> $GITHUB_ENV
        working-directory: demo

      - name: Base Setup
        uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1
        with:
          python_package_manager: "uv pip"
          python_cache_key_suffix: ${{ matrix.optional_dependencies || '' }}

      - name: Find out Playwright version
        id: pw-version
        run: |
          set -e
          PW_VERSION=$(grep -m1 "playwright@" yarn.lock)
          echo "Playwright version: $PW_VERSION"
          echo "version=$PW_VERSION" >> $GITHUB_OUTPUT
        working-directory: core

      - name: Set up browser cache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/pw-browsers
          key: ${{ runner.os }}-${{ matrix.browser }}-${{ steps.pw-version.outputs.version }}

      - name: Install dependencies
        env:
          OPTIONAL_DEPENDENCIES: ${{ matrix.optional_dependencies || '' }}
        run: |
          set -ex
          # Note: any changes to dependency pins need to
          # be done by updating the [docs-screenshots] group.
          bash ./scripts/ci_install.sh
        working-directory: core

      - name: Install ipykernel pre-release that supports subshells (TEMPORARY)
        if: ${{ matrix.project != 'documentation' }}
        run: |
          uv pip install --system --upgrade --pre "ipykernel<=7.0.0a1"
        working-directory: core

      - name: Launch JupyterLab
        run: |
          set -ex
          cd core/galata
          if [[ "${{ matrix.project }}" == "documentation" ]]; then
            JUPYTERLAB_GALATA_ROOT_DIR="${DEMO_DIR}" PYTHONWARNINGS=ignore \
              jupyter lab --config jupyter_server_test_config.py --extensions-in-dev-mode --custom-css > /tmp/jupyterlab_server.log 2>&1 &
          else
            jlpm start 2>&1 > /tmp/jupyterlab_server.log &
          fi

      - name: Install browser
        run: |
          set -ex
          cd core/galata
          # Install only the relevant browser for this matrix job
          jlpm playwright install ${{ matrix.browser }} --only-shell

      - name: Build galata
        run: |
          set -ex
          cd core/galata
          jlpm run build

      - name: Wait for JupyterLab
        run: timeout 360 bash -c 'until curl -f http://localhost:8888/lab > /dev/null 2>&1; do sleep 1; done'

      - name: Test
        run: |
          cd core/galata
          set +e  # we want to move the reports even if we fail
          jlpm run test --project ${{ matrix.project }} --shard ${{ matrix.shard }}/${{ matrix.shards }}
          TEST_EXIT_CODE=$?
          mv test-results/report.json test-results/${{ matrix.browser }}-${{ matrix.project }}-${{ matrix.shard }}.json

          BENCHMARK_EXIT_CODE=0
          if [[ "${{ matrix.browser }}" == "chromium" ]] && [[ "${{ matrix.project }}" == "galata" ]] && [[ "${{ matrix.shard }}" == "1" ]]; then
            # Run benchmark tests once to ensure they have no regressions
            BENCHMARK_NUMBER_SAMPLES=1 jlpm run test:benchmark
            BENCHMARK_EXIT_CODE=$?
            mv test-results/report.json test-results/benchmark-${{ matrix.browser }}-${{ matrix.project }}-${{ matrix.shard }}.json
          fi

          # mark as failing
          if [[ $TEST_EXIT_CODE -ne 0 ]] || [[ $BENCHMARK_EXIT_CODE -ne 0 ]]; then
            exit 1
          fi

      - name: Upload test assets
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: galata-test-assets-${{ matrix.browser }}-${{ matrix.project }}-${{ matrix.shard }}
          path: core/galata/test-results
          if-no-files-found: ignore  # expected when no tests fail

      - name: Upload test report blob
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: galata-blobs-${{ matrix.browser }}-${{ matrix.project }}-${{ matrix.shard }}
          path: core/galata/blob-report
          retention-days: 1
          compression-level: 1

      - name: Print JupyterLab logs
        if: always()
        run: |
          cat /tmp/jupyterlab_server.log

  merge-reports:
    name: Merge Test Reports and Results
    if: ${{ !cancelled() }}
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout lockfile
        uses: actions/checkout@v6
        with:
          sparse-checkout: yarn.lock
          sparse-checkout-cone-mode: false

      - name: Find out Playwright version
        id: pw-version
        run: |
          set -e
          PW_VERSION=$(grep -m1 '^"playwright@npm:' yarn.lock | sed -E 's/^"playwright@npm:([^"]+)":/\1/')
          echo "Playwright version: $PW_VERSION"
          echo "version=$PW_VERSION" >> $GITHUB_OUTPUT

      - name: Download aggregate blob artifact
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          name: galata-blobs-merged
          path: artifacts/base

      - name: Download individual blob artifacts
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          path: artifacts/overlay
          pattern: galata-blobs-*-*-*
          merge-multiple: true

      - name: Reconcile aggregate with individual shards
        # This is a workaround for https://github.com/actions/download-artifact/issues/298
        run: |
          set -euo pipefail
          mkdir -p artifacts/final

          # Start from aggregate chunks when available.
          if [[ -d artifacts/base ]]; then
            find artifacts/base -type f -name '*.zip' -exec cp -f {} artifacts/final/ \;
          fi

          # Replace chunks with individual shard outputs when available.
          if [[ -d artifacts/overlay ]]; then
            find artifacts/overlay -type f -name '*.zip' | while read -r ZIP_PATH; do
              ZIP_NAME=$(basename "$ZIP_PATH")
              rm -f "artifacts/final/${ZIP_NAME}"
              cp -f "$ZIP_PATH" "artifacts/final/${ZIP_NAME}"
            done
          fi

          COUNT=$(find artifacts/final -type f -name '*.zip' | wc -l)
          if [[ "$COUNT" -eq 0 ]]; then
            echo "No blob report chunks found to merge."
            exit 1
          fi
          echo "Prepared $COUNT blob report chunks for Playwright merge."

      - name: Merge Playwright reports
        run: |
          npx playwright@${{ steps.pw-version.outputs.version }} merge-reports --reporter html,github ./artifacts/final/

      - name: Upload merged reports
        uses: actions/upload-artifact@v6
        with:
          name: visual-regression-report
          path: playwright-report

      - name: Inline the report
        uses: jupyterlab/maintainer-tools/.github/actions/inline-playwright-report@v1
        with:
          path: playwright-report

      - name: Upload inlined report
        id: upload-report
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: visual-regression-report-standalone
          path: playwright-report/output.html

      - name: Add report link to job summary
        run: |
          echo "**[View Visual Regression Report](${{ steps.upload-report.outputs.artifact-url }})**" >> $GITHUB_STEP_SUMMARY

      - name: Merge and upload test results
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: actions/upload-artifact/merge@v6
        with:
          # The name matches the pattern so that it is picked again on re-runs
          name: galata-test-assets-merged
          pattern: galata-test-assets-*
          delete-merged: true

      - name: Merge blobs and delete individual shards
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact/merge@v6
        with:
          # The name matches the pattern so that it is picked again on re-runs
          name: galata-blobs-merged
          pattern: galata-blobs-*
          delete-merged: true
          retention-days: 1
          compression-level: 1
