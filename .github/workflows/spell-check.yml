name: Documentation Spell Check

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.txt'
      - 'docs/source/conf.py'
      - 'docs/source/_ext/**'
      - 'docs/source/spelling_wordlist.txt'
      - 'pyproject.toml'
      - 'scripts/check_spelling.py'
      - '.github/workflows/spell-check.yml'

permissions:
  contents: read

jobs:
  sphinx-spelling:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Install system dependencies for enchant
        run: |
          sudo apt-get update
          sudo apt-get install -y libenchant-2-2 aspell aspell-en

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --group docs pyenchant

      - name: Run Sphinx spelling builder
        run: |
          python scripts/check_spelling.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}"
