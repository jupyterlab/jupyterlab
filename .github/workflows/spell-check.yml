name: Documentation Spell Check

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.rst'
      - '**/*.txt'
      - '.codespellignore'
      - '.pre-commit-config.yaml'
      - 'docs/source/conf.py'
      - 'docs/source/_ext/**'
      - 'docs/source/spelling_wordlist.txt'
      - 'pyproject.toml'
      - '.github/workflows/spell-check.yml'

permissions:
  contents: read

jobs:
  codespell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Run codespell pre-commit hook
        run: pre-commit run codespell --all-files

  sphinx-spelling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies for enchant
        run: |
          sudo apt-get update
          sudo apt-get install -y libenchant-2-2 aspell aspell-en

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          import subprocess
          import sys
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text())
          docs_deps = pyproject["project"]["optional-dependencies"]["docs"]
          subprocess.check_call([sys.executable, "-m", "pip", "install", *docs_deps, "pyenchant"])
          PY

      - name: Run Sphinx spelling builder
        env:
          JUPYTERLAB_SPELLING_BUILD: '1'
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "$PR_BASE_REF"
          mapfile -t changed_docs_raw < <(
            git diff --name-only --diff-filter=ACMR \
              "$PR_BASE_SHA...$PR_HEAD_SHA" \
              | grep -E '^docs/source/.*\.(md|rst|txt)$' || true
          )
          if [ "${#changed_docs_raw[@]}" -eq 0 ]; then
            echo "No docs/source text files changed; skipping Sphinx spelling builder."
            exit 0
          fi
          changed_docs=()
          for path in "${changed_docs_raw[@]}"; do
            changed_docs+=("${path#docs/source/}")
          done
          printf 'Running Sphinx spelling for changed docs:\n%s\n' "${changed_docs[@]}"
          python -m sphinx -b spelling -W --keep-going docs/source docs/build/spelling "${changed_docs[@]}"
